version: '3.9'

services:
  postgres:
    image: postgres:16

    container_name: note_app_db

    restart: always

    environment:
      POSTGRES_DB: note_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
     - '5433:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: